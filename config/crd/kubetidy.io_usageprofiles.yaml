---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: usageprofiles.kubetidy.io
spec:
  group: kubetidy.io
  names:
    kind: UsageProfile
    listKind: UsageProfileList
    plural: usageprofiles
    shortNames:
    - up
    singular: usageprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .status.sampleCount
      name: Samples
      type: integer
    - jsonPath: .status.windowSeconds
      name: Window(s)
      type: number
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          UsageProfile records a workload's per-container resource usage over time, so kubetidy can
          produce Prometheus-grade rightsizing recommendations with no Prometheus.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UsageProfileSpec is the small, user/operator-set part of
              a UsageProfile.
            properties:
              targetRef:
                description: TargetRef identifies the workload this profile describes.
                properties:
                  kind:
                    description: Kind is the workload controller kind (Deployment,
                      StatefulSet, DaemonSet).
                    type: string
                  name:
                    description: Name is the workload's name.
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - targetRef
            type: object
          status:
            description: UsageProfileStatus is the operator-maintained recorded history.
            properties:
              containers:
                description: Containers holds the per-container recorded usage.
                items:
                  description: ContainerHistory holds the recorded history for a single
                    named container.
                  properties:
                    cpu:
                      description: CPU is the CPU usage history (millicores).
                      properties:
                        histogram:
                          description: |-
                            Histogram is the base64-encoded decaying-histogram snapshot, so the operator can resume
                            exact percentile tracking after a restart. Consumers needing only summaries can ignore it.
                          type: string
                        max:
                          description: Max is the largest observed value.
                          type: number
                        p50:
                          description: P50 is the median observed value (CPU in millicores,
                            memory in bytes).
                          type: number
                        p95:
                          description: P95 is the 95th-percentile observed value.
                          type: number
                      required:
                      - max
                      - p50
                      - p95
                      type: object
                    memory:
                      description: Memory is the memory usage history (bytes).
                      properties:
                        histogram:
                          description: |-
                            Histogram is the base64-encoded decaying-histogram snapshot, so the operator can resume
                            exact percentile tracking after a restart. Consumers needing only summaries can ignore it.
                          type: string
                        max:
                          description: Max is the largest observed value.
                          type: number
                        p50:
                          description: P50 is the median observed value (CPU in millicores,
                            memory in bytes).
                          type: number
                        p95:
                          description: P95 is the 95th-percentile observed value.
                          type: number
                      required:
                      - max
                      - p50
                      - p95
                      type: object
                    name:
                      description: Name is the container name.
                      type: string
                  required:
                  - cpu
                  - memory
                  - name
                  type: object
                type: array
              extensions:
                additionalProperties:
                  type: string
                description: |-
                  Extensions is an open key/value area for experimental or vendor data, so the resource
                  can be extended without a schema migration. Promote stable fields into the typed core.
                type: object
              lastUpdated:
                description: LastUpdated is the most recent checkpoint time (RFC3339).
                type: string
              observedSince:
                description: ObservedSince is when the operator first recorded usage
                  for this workload (RFC3339).
                type: string
              sampleCount:
                description: SampleCount is the total number of usage samples folded
                  into the history.
                format: int64
                type: integer
              windowSeconds:
                description: WindowSeconds is the observation window covered, in seconds.
                type: number
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
