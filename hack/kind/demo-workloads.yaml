# Demo workloads for kubetidy local testing.
#
# These are deliberately OVER-PROVISIONED: each asks for far more CPU/memory than it uses,
# so `kubectl tidy scan` surfaces real rightsizing savings and a low efficiency score.
apiVersion: v1
kind: Namespace
metadata:
  name: kubetidy-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: kubetidy-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: checkout-api
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "2000m"     # asks for 2 cores...
              memory: "4Gi"    # ...and 4Gi, but pause uses almost nothing
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-indexer
  namespace: kubetidy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-indexer
  template:
    metadata:
      labels:
        app: search-indexer
    spec:
      containers:
        - name: search-indexer
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "4000m"
              memory: "8Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  namespace: kubetidy-demo
spec:
  serviceName: cache
  replicas: 3
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: cache
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
