# Demo workloads for kubetidy local testing.
#
# These are deliberately OVER-PROVISIONED: each asks for far more CPU/memory than it uses
# (the pause image uses almost nothing), so `kubectl tidy scan` surfaces real rightsizing
# savings and a low efficiency score.
#
# Requests are sized to fit on a single default kind node (12 CPU / ~8Gi): the whole namespace
# asks for ~5 cores / ~5Gi, so every pod schedules and the rollout settles.
apiVersion: v1
kind: Namespace
metadata:
  name: kubetidy-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: kubetidy-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: checkout-api
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "1000m"     # asks for a full core...
              memory: "1Gi"    # ...and 1Gi, but pause uses almost nothing
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-indexer
  namespace: kubetidy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-indexer
  template:
    metadata:
      labels:
        app: search-indexer
    spec:
      containers:
        - name: search-indexer
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "2000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  namespace: kubetidy-demo
spec:
  serviceName: cache
  replicas: 2
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: cache
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
