---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: recommendations.kubetidy.io
spec:
  group: kubetidy.io
  names:
    kind: Recommendation
    listKind: RecommendationList
    plural: recommendations
    shortNames:
    - rec
    singular: recommendation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .spec.source
      name: Source
      type: string
    - jsonPath: .status.score
      name: Score
      type: integer
    - jsonPath: .status.monthlySavings
      name: Savings/mo
      type: number
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Recommendation is a single, scored, rankable rightsizing recommendation for a workload,
          produced by the rules engine today and (designed-for) an LLM in future.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: 'RecommendationSpec is the request: which workload, from
              what source, over what inputs.'
            properties:
              generatedAt:
                description: GeneratedAt is when the recommendation was produced (RFC3339).
                type: string
              inputsRef:
                description: InputsRef names the UsageProfile (and window) the recommendation
                  was derived from.
                type: string
              namespace:
                description: Namespace is the workload's namespace.
                type: string
              source:
                description: Source is what produced this recommendation (rules or
                  llm).
                enum:
                - rules
                - llm
                type: string
              targetRef:
                description: TargetRef identifies the workload this recommendation
                  applies to.
                properties:
                  kind:
                    description: Kind is the workload controller kind (Deployment,
                      StatefulSet, DaemonSet).
                    type: string
                  name:
                    description: Name is the workload's name.
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - namespace
            - source
            - targetRef
            type: object
          status:
            description: RecommendationStatus is the scored, rankable result a cluster/UI
              consumes.
            properties:
              changes:
                description: Changes is the proposed per-container resource changes
                  (the reversible action).
                items:
                  description: ResourceChange is a proposed per-container request
                    change.
                  properties:
                    container:
                      description: Container is the container name.
                      type: string
                    cpuRequestMillicores:
                      description: CPURequestMillicores is the proposed CPU request
                        in millicores.
                      format: int64
                      type: integer
                    memoryRequestBytes:
                      description: MemoryRequestBytes is the proposed memory request
                        in bytes.
                      format: int64
                      type: integer
                  required:
                  - container
                  type: object
                type: array
              confidence:
                description: Confidence is the 0..100 confidence in the recommendation.
                type: integer
              evidence:
                description: Evidence is short human-readable justification lines.
                items:
                  type: string
                type: array
              explanation:
                description: Explanation is the full derivation shown to a user.
                type: string
              extensions:
                additionalProperties:
                  type: string
                description: Extensions is an open key/value area for experimental
                  or vendor data.
                type: object
              model:
                description: Model records the LLM model identifier when Source is
                  llm.
                type: string
              monthlySavings:
                description: MonthlySavings is the estimated $/month saved (negative
                  means the workload should grow).
                type: number
              score:
                description: Score is the 0..100 desirability of this recommendation;
                  consumers rank by it.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
