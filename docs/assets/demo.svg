<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380" role="img" aria-label="kubectl tidy scan terminal demo">
  <style>
    .win   { fill: #0d1117; }
    .bar   { fill: #161b22; }
    text   { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 15px; }
    .dim   { fill: #8b949e; }
    .fg    { fill: #c9d1d9; }
    .green { fill: #3fb950; }
    .blue  { fill: #58a6ff; }
    .yellow{ fill: #d29922; }
    .prompt{ fill: #3fb950; }

    /* Each line is hidden, then revealed at its slot, held, then reset so the 14s loop repeats. */
    .l { opacity: 0; }
    .l1 { animation: a1 14s infinite; }
    .l2 { animation: a2 14s infinite; }
    .l3 { animation: a3 14s infinite; }
    .l4 { animation: a4 14s infinite; }
    .l5 { animation: a5 14s infinite; }
    .l6 { animation: a6 14s infinite; }
    .l7 { animation: a7 14s infinite; }
    .l8 { animation: a8 14s infinite; }
    .l9 { animation: a9 14s infinite; }

    @keyframes a1 { 0%,2% {opacity:0} 5%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a2 { 0%,12% {opacity:0} 15%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a3 { 0%,20% {opacity:0} 23%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a4 { 0%,28% {opacity:0} 31%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a5 { 0%,34% {opacity:0} 37%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a6 { 0%,42% {opacity:0} 45%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a7 { 0%,48% {opacity:0} 51%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a8 { 0%,56% {opacity:0} 59%,95% {opacity:1} 100% {opacity:0} }
    @keyframes a9 { 0%,66% {opacity:0} 69%,95% {opacity:1} 100% {opacity:0} }

    /* command "types" in via a clip rectangle that widens with steps */
    #typed { animation: type 14s infinite; }
    @keyframes type { 0%,2% {width:0} 11% {width:220px} 95% {width:220px} 100% {width:0} }

    .cursor { fill: #c9d1d9; animation: blink 1.05s steps(2) infinite; }
    @keyframes blink { 0%,50% {opacity:1} 50.01%,100% {opacity:0} }
  </style>

  <!-- window -->
  <rect class="win" x="0" y="0" width="760" height="380" rx="10"/>
  <rect class="bar" x="0" y="0" width="760" height="34" rx="10"/>
  <rect class="bar" x="0" y="24" width="760" height="10"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text class="dim" x="380" y="22" text-anchor="middle" font-size="13">kubetidy — zsh</text>

  <!-- command line: prompt + typed command (clipped) + cursor -->
  <clipPath id="clip"><rect id="typed" x="44" y="58" width="0" height="22"/></clipPath>
  <text class="prompt" x="20" y="75">$</text>
  <g clip-path="url(#clip)">
    <text class="fg" x="44" y="75">kubectl tidy scan</text>
  </g>
  <rect class="cursor" x="266" y="61" width="8" height="16"/>

  <!-- output -->
  <text class="dim l l2" x="20" y="104">scanning prod-us-east · tier 1 (Prometheus, 14d)</text>

  <text class="fg l l3" x="20" y="142">Cluster Efficiency Score:  <tspan class="yellow">41 / 100</tspan>   <tspan class="yellow">▇▇▇▇</tspan><tspan class="dim">░░░░░░</tspan></text>
  <text class="fg l l4" x="20" y="168">Rightsizing waste:         <tspan class="green">$7,420 / month</tspan></text>

  <text class="dim l l5" x="20" y="204">TOP RECOMMENDATIONS</text>
  <text class="fg l l6" x="20" y="230"><tspan class="blue">checkout-api</tspan>    cpu 2000m→320m   mem 4Gi→1.1Gi   <tspan class="green">-$210/mo</tspan>   conf 96%</text>
  <text class="fg l l7" x="20" y="256"><tspan class="blue">search-indexer</tspan>  cpu 4000m→1500m  mem 8Gi→6Gi     <tspan class="green">-$180/mo</tspan>   conf 91%</text>
  <text class="dim l l8" x="40" y="280">evidence: P95 cpu 280m, max mem 0.9Gi over 14d</text>

  <text class="green l l9" x="20" y="320">✓ tidy — run `kubectl tidy diff` to see the reversible patches.</text>
</svg>
