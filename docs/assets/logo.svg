<svg xmlns="http://www.w3.org/2000/svg" width="380" height="104" viewBox="0 0 380 104" role="img" aria-label="kubetidy — rightsize your cluster, cut the bill">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#326CE5"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Icon: a broom (tidy) sweeping, with a green downward $ (cut the bill) -->
  <g transform="translate(12,12)">
    <rect width="80" height="80" rx="18" fill="url(#badge)"/>

    <!-- sweep sparkles -->
    <g fill="#FFFFFF" opacity="0.85">
      <circle cx="18" cy="40" r="2"/>
      <circle cx="14" cy="50" r="1.6"/>
      <circle cx="22" cy="54" r="1.6"/>
    </g>

    <!-- broom handle -->
    <rect x="46" y="14" width="6" height="34" rx="3" transform="rotate(32 49 31)" fill="#FFFFFF"/>
    <!-- broom head -->
    <path d="M30 50 L52 42 L60 58 L34 66 Z" fill="#FFFFFF"/>
    <!-- bristles -->
    <g stroke="#326CE5" stroke-width="2" stroke-linecap="round">
      <line x1="35" y1="58" x2="33" y2="66"/>
      <line x1="41" y1="56" x2="40" y2="65"/>
      <line x1="47" y1="54" x2="47" y2="64"/>
      <line x1="53" y1="52" x2="54" y2="62"/>
    </g>

    <!-- savings badge: green down-arrow + $ -->
    <g transform="translate(52,48)">
      <circle cx="11" cy="11" r="13" fill="#16A34A" stroke="#FFFFFF" stroke-width="2"/>
      <text x="11" y="15" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">$</text>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="108" y="52" font-size="36" font-weight="800" fill="#1F2937">kube<tspan fill="#14B8A6">tidy</tspan></text>
    <text x="110" y="76" font-size="14" font-weight="500" fill="#6B7280">rightsize your cluster · cut the bill</text>
  </g>
</svg>
